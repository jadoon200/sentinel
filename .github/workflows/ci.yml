name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install dependencies
        run: pip install -r requirements.lock && pip install -e .
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest
      - name: Migrations apply, roll back, and re-apply
        env:
          SENTINEL_DATABASE_URL: postgresql+psycopg://sentinel:sentinel@localhost:5432/sentinel
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  # Build + lint the React/TS dashboard so UI regressions fail CI too.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (tsc + vite)
        run: npm run build
      # The dashboard's ti-* icons come from the Tabler webfont; if its CSS ever
      # falls out of the bundle again, every icon silently renders as empty space
      # (shipped that way once) - so make its absence a hard CI failure.
      - name: Icon font present in bundle
        run: grep -rlq "tabler-icons" dist/assets/*.css && ls dist/assets/tabler-icons-*.woff2

  # Exercises the MLX backends (anomaly_mlx, sequence) that Linux can't import.
  macos-mlx:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install libomp (lightgbm runtime dependency on macOS wheels)
        run: brew install libomp
      - name: Install dependencies
        run: |
          pip install -r requirements.lock && pip install -e .
          pip install -r requirements-mlx.txt
      - name: Tests
        run: pytest
